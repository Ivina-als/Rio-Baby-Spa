<section class="base-section footer-container">
  <picture>
    <source
      height="436px"
      media="(min-width: 1124px)"
      srcset="assets/images/footer-background-desktop.webp"
      width="552px"
    />
    <source
      height="570px"
      media="(min-width: 768px)"
      srcset="assets/images/footer-background-tablet.webp"
      width="493px"
    />
    <img
      src="assets/images/footer-background-mobile.webp"
      alt="Imagem de fundo do footer"
      width="361px"
      loading="lazy"
      height="483px"
      class="footer-container__picture__img"
    />
  </picture>
  <div class="width-container footer-container__content">
    <img
      src="assets/images/logo-rio-baby.webp"
      width="143px"
      height="125px"
      alt="Logo Rio Baby Spa"
      class="footer-container__content__logo__img"
    />

    <div class="footer-container__content__social__media">
      <p class="footer-container__content__social__media__title">
        Nos acompanhe nas redes sociais
      </p>
      <div class="footer-container__content__social__media__icons">
        <a href="https://www.tiktok.com/@riobabyspa" target="_blank">
          <img
            src="assets/icons/tiktok-icon.svg"
            width="36px"
            height="36px"
            alt="Icone tiktok"
            class="footer-container__content__social__media__icons__img"
          />
        </a>
        <a href="https://www.instagram.com/riobabyspa/" target="_blank">
          <img
            src="assets/icons/instagram-icon.svg"
            width="36px"
            height="36px"
            alt="Icone instagram"
            class="footer-container__content__social__media__icons__img"
          />
        </a>
      </div>
    </div>

    <div class="footer-container__content__gps">
      <p class="footer-container__content__gps__title">Nossa Localização</p>

      <a
        href="https://www.google.com/maps/place/Shopping+Main+Street/@-22.9396935,-43.3438326,17z/data=!3m2!4b1!5s0x9bd831a94e5d6f:0x6fe38ed1697d0043!4m6!3m5!1s0x9bd83101f8f291:0x447150b486c4a960!8m2!3d-22.9396935!4d-43.3412577!16s%2Fg%2F1tgdk6rj?entry=ttu&g_ep=EgoyMDI2MDIyNS4wIKXMDSoASAFQAw%3D%3D"
        target="_blank"
        class="footer-container__content__gps__address"
      >
        <span class="footer-container__content__gps__address__no__prefix">
          Estrada dos Três Rios, 200 - bloco 3 - Loja 213 - Freguesia
          (Jacarepaguá), Rio de Janeiro - RJ - 22755-002
        </span>

        <span class="footer-container__content__gps__address__prefix">
          Estrada dos Três Rios, 200 - bloco 3 - Loja 213 - Freguesia
          (Jacarepaguá), Rio de Janeiro - RJ - 22755-002
        </span>
      </a>
    </div>

    <a href="#">
      <img
        src="assets/icons/arrow-up-page-icon.svg"
        width="36px"
        height="36px"
        alt="Seta voltar ao topo"
        class="footer-container__content__arrow_up"
      />
    </a>
  </div>
</section>
