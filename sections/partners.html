<section class="base-section partners-container">

        <div class="partners-container__content__images__box__content">

      <div class="partners-container__content__images__box">

    <p class="partners-container__content__subtitle">Trabalhe conosco!</p>

    <p class="partners-container__content__text">
      Envie sua proposta ou currículo para nosso e-mail:
    </p>

    <a

      class="partners-container__content__ancor"
    >
      <img
        src="assets/icons/email-icon.svg"
        width="22px"
        height="22px"
        alt="Âncora para email"
      />
      Rio Baby Spa
