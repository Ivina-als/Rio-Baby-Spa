  <!-- modal de serviços -->

  <div class="services__container__modal">
    <div class="services__container__modal__overlay"></div>
    <div class="services__container__modal__content">
      <div class="services__container__modal__content__box">
        <picture class="services__container__modal__content__box__picture">
          <source
            height="525px"
            media="(min-width: 768px)"
            srcset="assets/images/bubblecard_oppen_desktop.webp"
            width="816px"
          />
          <img
            alt="Fundo aguarela azul"
            class="services__container__modal__content__box__picture__img"
            loading="eager"
            widdth="320px"
            src="assets/images/bubblecard_oppen_mobile.webp"
            height="612px"
          />
        </picture>
        <button class="services__container__modal__content__box__close">
          <img
            alt="Botão para fechar modal"
            loading="lazy"
            widdth="36px"
            loading="lazy"
            src="assets/icons/icon-close-modal.svg"
            height="36px"
          />
        </button>
        <div class="services__container__modal__content__box__package">
          <p
            class="services__container__modal__content__box__package__title"
          ></p>
          <span
            class="services__container__modal__content__box__package__subtitle"
          ></span>

          <p
            class="services__container__modal__content__box__package__includes"
          >
            Inclui:
          </p>

          <div
            class="services__container__modal__content__box__package__benefits"
          >

              class="services__container__modal__content__box__package__benefits__left"
            ></div>
            <div

                class="services__container__modal__content__box__package__benefits__box-right__right"

              <a
                class="services__container__modal__content__box__package__benefits__box-right__anchor"
                >Agendar sessão</a
              >
              <span
                class="services__container__modal__content__box__package__benefits__box-right__alert"
              ></span>
