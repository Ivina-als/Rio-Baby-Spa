<div class="base-section scheduling-container">
  <picture>
    <source
      height="1091px"
      media="(min-width: 1124px)"
      srcset="assets/images/scheduling-background-desktop.webp"
      width="1124px"
    />
    <source
      height="905px"
      media="(min-width: 768px)"
      srcset="assets/images/scheduling-background-tablet.webp"
      width="768px"
    />
    <img
      src="assets/images/scheduling-background-mobile.webp"
      alt="Imagem de fundo dos parceiros"
      width="366px"
      loading="lazy"
      height="690px"
      class="scheduling-container__picture__img"
    />
  </picture>
  <div class="width-container scheduling-container__content">
    <h1 class="scheduling-container__content__title">
      Agende seu<br />
      horário
    </h1>

    <picture>
      <source
        height="314px"
        media="(min-width: 1124px)"
        srcset="assets/images/scheduling-mother-and-son-desktop.webp"
        width="1124px"
      />
      <source
        height="270px"
        media="(min-width: 768px)"
        srcset="assets/images/scheduling-mother-and-son-tablet.webp"
        width="454px"
      />

      <img
        src="assets/images/scheduling-mother-and-son-mobile.webp"
        width="360px"
        height="226px"
        alt="Imagem mãe e filho"
        class="scheduling-container__content__picture__img"
      />
    </picture>

    <h1 class="scheduling-container__content__subtitle">Nosso Funcionamento</h1>

    <div class="scheduling-container__content__img__days">
      <img
        src="assets/images/scheduling-bubbles.webp"
        width="46px"
        height="182px"
        alt="Bolhas"
        class="scheduling-container__content__img__days__img__bubbles"
      />

      <div class="scheduling-container__content__img__days__days">
        <div class="scheduling-container__content__days">
          <p>Segunda a Sexta</p>
          <span>09:00 às 18:00</span>
        </div>

        <div class="scheduling-container__content__days">
          <p>Sábado</p>
          <span>09:00 às 13:00</span>
        </div>

        <div class="scheduling-container__content__days">
          <p>Domingos e feriados</p>
          <span>Fechado</span>
        </div>
      </div>
    </div>

    <a
      href="https://api.whatsapp.com/send/?phone=5521973048827&text&type=phone_number&app_absent=0"
      class="scheduling-container__content__ancor"
    >
      Agende sua sessão
    </a>
  </div>
</div>
