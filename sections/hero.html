<section class="hero-container">
  <picture class="hero-container__picture">
    <source
      height="707px"
      media="(min-width: 1124px)"
      srcset="assets/images/hero-desktop.webp"
      width="1124px"
    />

    <source
      height="570px"
      media="(min-width: 768px)"
      srcset="assets/images/hero-tablet.webp"
      width="768px"
    />
    <img
      alt="Bebê relaxando no Spa"
      class="hero-container__picture__image"
      decoding="async"
      fetchpriority="high"
      widdth="360px"
      loading="eager"
      src="assets/images/hero-mobile.webp"
      height="528px"
    />
  </picture>
  <div class="hero-container__content">
    <div class="base-section">
      <div class="width-container">
        <div class="hero-container__content__box">
          <img
            class="hero-container__content__box__img"
            alt="Logomarca Rio Baby Spa"
            width="300px"
            decoding="async"
            fetchpriority="high"
            height="263px"
            loading="eager"
            src="assets/images/logo-rio-baby.webp"
          />
          <h1 class="hero-container__content__box__title">
            Clínica de Hidroestimulação e Massagem Infantil
          </h1>
          <a
            class="hero-container__content__box__anchor"
            id="baby-spa-schedule-button"
            href="#services-root"
            >Agende sua sessão</a
          >
          <p class="hero-container__content__box__subtitle">
            Cuidado, e bem-estar para os primeiros meses de vida do seu bebê.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
